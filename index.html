<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR Volunteer Outfit Selector</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <video id="input_video" autoplay muted playsinline></video>
  <canvas id="output_canvas"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <!-- Scale control slider -->
  <div id="scale-control" class="expanded" style="
    position: fixed;
    bottom: 20px;
    right: 20px;
    left: auto;
    max-width: 340px;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 15px 20px;
    z-index: 10000;
    font-family: system-ui, -apple-system, sans-serif;
    pointer-events: auto;
  ">
    <div id="scale-header" style="display: flex; justify-content: space-between; color: white; margin-bottom: 10px;">
      <span style="font-size: 16px; font-weight: 600;">👕 Jacket Size</span>
      <span id="scale-value" style="font-size: 16px; font-weight: bold; background: #007bff; padding: 4px 12px; border-radius: 20px;">1.5x</span>
    </div>
    <div id="scale-content">
      <input type="range" id="jacket-scale-slider" min="0.5" max="2.5" step="0.01" value="1.5" style="
        width: 100%;
        height: 6px;
        -webkit-appearance: none;
        background: #333;
        border-radius: 3px;
        outline: none;
      ">
      <div style="display: flex; justify-content: space-between; color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 8px;">
        <span>Smaller (0.5x)</span>
        <span>Reset</span>
        <span>Larger (2.5x)</span>
      </div>
      <button id="reset-scale" style="
        background: #007bff;
        border: none;
        color: white;
        padding: 8px 16px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 10px;
        width: 100%;
      ">Reset to 1.5x</button>
    </div>
    <button id="scale-toggle" class="scale-toggle-button" aria-expanded="true" title="Toggle size controls">☰</button>
  </div>

  <script src="main.js"></script>
</body>
</html>
